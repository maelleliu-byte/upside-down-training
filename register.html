<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Créer mon studio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#f0f0f0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#111;border:1px solid #222;border-radius:20px;padding:32px 28px;width:100%;max-width:440px;}
h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#e8ff47;margin-bottom:8px;}
.subtitle{color:#888;font-size:14px;margin-bottom:32px;}
.field{margin-bottom:20px;}
label{display:block;font-size:13px;color:#aaa;margin-bottom:8px;font-weight:500;}
input[type=text],input[type=email],input[type=password]{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#f0f0f0;font-size:15px;outline:none;transition:border-color .2s;}
input:focus{border-color:#e8ff47;}
.slug-preview{font-size:12px;color:#555;margin-top:6px;}
.slug-preview span{color:#888;}
.color-row{display:flex;gap:10px;align-items:center;}
input[type=color]{width:48px;height:48px;border:1px solid #333;border-radius:10px;cursor:pointer;background:none;padding:4px;}
.color-label{font-size:14px;color:#aaa;}
.logo-area{border:2px dashed #333;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;}
.logo-area:hover{border-color:#e8ff47;}
.logo-area input{display:none;}
.logo-preview{width:80px;height:80px;object-fit:contain;border-radius:8px;margin:0 auto 8px;display:none;}
.logo-hint{font-size:13px;color:#666;}
.btn{width:100%;background:#e8ff47;color:#0a0a0a;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:8px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.error{background:#ff474720;border:1px solid #ff4747;border-radius:8px;padding:10px 14px;font-size:13px;color:#ff7070;margin-top:16px;display:none;}
.success{background:#47ff8020;border:1px solid #47ff80;border-radius:8px;padding:16px;font-size:14px;color:#80ffb0;margin-top:16px;display:none;}
.divider{height:1px;background:#1e1e1e;margin:24px 0;}
a{color:#e8ff47;text-decoration:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <h1>Créer mon studio</h1>
  <p class="subtitle">Rejoin la plateforme Upside Down Training</p>

  <div class="field">
    <label>Nom du studio</label>
    <input type="text" id="studio-name" placeholder="Ex: CrossFit Bordeaux" oninput="autoSlug()">
  </div>

  <div class="field">
    <label>URL de ton studio</label>
    <input type="text" id="studio-slug" placeholder="ex: crossfit-bordeaux" oninput="cleanSlug()">
    <div class="slug-preview">upside-down-training.netlify.app/<span id="slug-display">…</span></div>
  </div>

  <div class="field">
    <label>Couleur principale</label>
    <div class="color-row">
      <input type="color" id="accent-color" value="#e8ff47">
      <span class="color-label">Couleur de ta marque</span>
    </div>
  </div>

  <div class="field">
    <label>Logo (optionnel)</label>
    <div class="logo-area" onclick="document.getElementById('logo-input').click()">
      <img id="logo-preview" class="logo-preview">
      <input type="file" id="logo-input" accept="image/*" onchange="previewLogo(event)">
      <div class="logo-hint" id="logo-hint">Clique pour uploader ton logo<br><small>PNG, JPG — max 2 Mo</small></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Ton email</label>
    <input type="email" id="reg-email" placeholder="coach@monstudio.fr">
  </div>

  <div class="field">
    <label>Mot de passe</label>
    <input type="password" id="reg-pwd" placeholder="Min. 8 caractères">
  </div>

  <div class="field">
    <label>Ton nom</label>
    <input type="text" id="reg-name" placeholder="Prénom Nom">
  </div>

  <button class="btn" id="submit-btn" onclick="submitRegister()">Créer mon studio</button>
  <div class="error" id="reg-error"></div>
  <div class="success" id="reg-success"></div>

  <div class="divider"></div>
  <p style="text-align:center;font-size:13px;color:#555;">Déjà un compte ? <a href="/">Se connecter</a></p>
</div>

<script>
const SUPABASE_URL='https://tltqtpbaaxiwwpvuzszt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsdHF0cGJhYXhpd3dwdnV6c3p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDA5NTQsImV4cCI6MjA5MzUxNjk1NH0.5LVedQ-ktLcTC6z2X0XIoqY-mqP9_tw-gzrt-KNfuuY';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function autoSlug(){
  const name=document.getElementById('studio-name').value;
  const slug=name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-')
    .replace(/-+/g,'-').slice(0,30);
  document.getElementById('studio-slug').value=slug;
  document.getElementById('slug-display').textContent=slug||'…';
}

function cleanSlug(){
  const val=document.getElementById('studio-slug').value;
  const slug=val.toLowerCase().replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').slice(0,30);
  document.getElementById('studio-slug').value=slug;
  document.getElementById('slug-display').textContent=slug||'…';
}

let logoFile=null;
function previewLogo(e){
  const file=e.target.files?.[0];
  if(!file)return;
  if(file.size>2*1024*1024){showError('Logo trop lourd (max 2 Mo)');return;}
  logoFile=file;
  const url=URL.createObjectURL(file);
  const preview=document.getElementById('logo-preview');
  preview.src=url;preview.style.display='block';
  document.getElementById('logo-hint').style.display='none';
}

function showError(msg){
  const el=document.getElementById('reg-error');
  el.textContent=msg;el.style.display='block';
}

async function submitRegister(){
  const name=document.getElementById('studio-name').value.trim();
  const slug=document.getElementById('studio-slug').value.trim();
  const accent=document.getElementById('accent-color').value;
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-pwd').value;
  const coachName=document.getElementById('reg-name').value.trim();

  document.getElementById('reg-error').style.display='none';
  document.getElementById('reg-success').style.display='none';

  if(!name||!slug||!email||!pwd||!coachName){showError('Tous les champs obligatoires doivent être remplis.');return;}
  if(pwd.length<8){showError('Mot de passe trop court (min. 8 caractères).');return;}
  if(!/^[a-z0-9-]+$/.test(slug)){showError('Le slug ne peut contenir que des lettres minuscules, chiffres et tirets.');return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Création en cours…';

  try{
    // 1. Vérifier que le slug n'existe pas déjà
    const {data:existing}=await sb.from('studios').select('id').eq('slug',slug).maybeSingle();
    if(existing){showError('Ce slug est déjà pris. Choisis-en un autre.');btn.disabled=false;btn.textContent='Créer mon studio';return;}

    // 2. Créer le compte auth
    const {data:authData,error:authErr}=await sb.auth.signUp({email,password:pwd,options:{data:{full_name:coachName}}});
    if(authErr)throw authErr;
    const userId=authData.user?.id;
    if(!userId)throw new Error('Erreur création compte');

    // 3. Uploader le logo si présent
    let logo_url=null;
    if(logoFile){
      const ext=(logoFile.name.split('.').pop()||'png').toLowerCase();
      const path=`studios/${slug}/logo.${ext}`;
      const {error:uploadErr}=await sb.storage.from('avatars').upload(path,logoFile,{upsert:true,contentType:logoFile.type});
      if(!uploadErr){
        const {data:pub}=sb.storage.from('avatars').getPublicUrl(path);
        logo_url=pub.publicUrl.startsWith('http') ? pub.publicUrl : 'https://'+pub.publicUrl;
      }
    }

    // 4. Créer le studio (is_active = false — attente validation)
    const {data:studio,error:studioErr}=await sb.from('studios').insert({
      slug,name,accent_color:accent,logo_url,
      is_active:false,lang:'fr',owner_id:userId
    }).select('id').single();
    if(studioErr)throw studioErr;

    // 5. Créer le profil coach
    const {error:profErr}=await sb.from('profiles').upsert({
      id:userId,email,full_name:coachName,
      role:'admin',studio_id:studio.id
    },{onConflict:'id'});
    if(profErr)throw profErr;

    // Succès
    const el=document.getElementById('reg-success');
    el.innerHTML=`🎉 <strong>Studio créé !</strong><br><br>Ton studio <strong>${name}</strong> est en attente de validation. Tu recevras un email dès que ton accès sera activé.<br><br>URL future : <strong>/${slug}</strong>`;
    el.style.display='block';
    btn.textContent='Demande envoyée ✓';

  }catch(err){
    showError(err.message||'Une erreur est survenue.');
    btn.disabled=false;btn.textContent='Créer mon studio';
  }
}
</script>
</body>
</html>
